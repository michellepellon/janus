<!-- ABOUTME: Janus home-climate dashboard page — static shell with header, range presets,
     and a sensors container that dash.js fills from /api/dashboard. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Janus</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23fffff8'/%3E%3Ctext x='8' y='12.5' text-anchor='middle' font-family='Georgia,serif' font-size='13' fill='%23a63d2f'%3EJ%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="masthead">
      <h1>Janus</h1>
      <!-- The range presets live on the masthead because they govern every
           module's window, paired with the freshness line they qualify. -->
      <div class="mastmeta">
        <div id="generated" class="generated"></div>
        <nav id="presets" class="presets" aria-label="time range"></nav>
        <button id="theme" class="themetoggle" type="button"></button>
      </div>
    </div>
  </header>
  <main>
    <section class="module" aria-labelledby="climate-title">
      <div class="module-head">
        <h2 class="module-title" id="climate-title">house climate</h2>
        <!-- The cooling verdict shares the module-head line: one sentence,
             right-aligned into the head's empty space, filled by dash.js. -->
        <p class="module-line" id="climate-line"></p>
      </div>
      <div id="cooling"></div>
      <div id="sensors"></div>
    </section>
    <!-- Hidden until /api/dashboard reports devices (a paired Hue bridge).
         The masthead's global time-range presets drive this module's
         window too. -->
    <section class="module" id="lights-module" aria-labelledby="lights-title" hidden>
      <div class="module-head">
        <h2 class="module-title" id="lights-title">lights &amp; outlets</h2>
      </div>
      <div id="devices"></div>
    </section>
  </main>
</div>
<div id="tooltip" class="tooltip" role="status"><span class="val"></span><span class="time"></span></div>
<script src="dash.js"></script>
</body>
</html>
